# ============================================================
# Deployment 1: Desktop Browser Traffic
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noname-desktop-browser
  namespace: noname-security
  labels:
    app: noname-security
    profile: desktop-browser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: noname-security
      profile: desktop-browser
  template:
    metadata:
      labels:
        app: noname-security
        profile: desktop-browser
    spec:
      containers:
      - name: noname-agent
        image: noname-security:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: CONTAINER_ID
          value: "container-1-desktop"
        - name: PROFILE
          value: "desktop_browser"
        args: ["--rate", "5"]
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: config
          mountPath: /app/config/settings.yaml
          subPath: settings.yaml
      volumes:
      - name: config
        configMap:
          name: noname-config
---
